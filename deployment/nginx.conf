server {
    listen 80;
    server_name your_domain.com;  # Replace with your domain or EC2 public IP

    # Frontend static files
    location / {
        root /home/ubuntu/CC_miniproject/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api {
        rewrite ^/api(.*) $1 break;
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for large file uploads
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }

    # Increase max upload size
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/image-processor-access.log;
    error_log /var/log/nginx/image-processor-error.log;
}

